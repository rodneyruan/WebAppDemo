<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bookmarks</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f8;
      --panel: #ffffff;
      --ink: #182024;
      --muted: #5f6f76;
      --line: #d8e0e3;
      --accent: #007f75;
      --accent-strong: #005e57;
      --amber: #b56b00;
      --shadow: 0 12px 32px rgba(23, 38, 43, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      display: grid;
      gap: 18px;
      margin-bottom: 22px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.25rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stat {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      padding: 7px 12px;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: center;
    }

    .search {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 14px;
      font: inherit;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .search:focus,
    .file-label:focus-within,
    button:focus-visible,
    summary:focus-visible {
      outline: 3px solid rgba(0, 127, 117, 0.22);
      outline-offset: 2px;
    }

    button,
    .file-label {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 13px;
      font: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    button:hover,
    .file-label:hover {
      border-color: #b9c8cc;
      box-shadow: 0 5px 18px rgba(23, 38, 43, 0.08);
    }

    .file-label input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status.error {
      color: #9b2c2c;
    }

    .categories {
      display: grid;
      gap: 12px;
    }

    details.category {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: clip;
    }

    summary {
      min-height: 58px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .chevron {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--accent-strong);
      background: #e5f5f2;
      transform: rotate(-90deg);
      transition: transform 160ms ease;
    }

    details[open] .chevron {
      transform: rotate(0deg);
    }

    .category-name {
      font-weight: 760;
      font-size: 1.05rem;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .count {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
      padding: 0 16px 16px;
    }

    .bookmark {
      min-height: 126px;
      display: grid;
      align-content: start;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      color: inherit;
      text-decoration: none;
      background: #fbfcfc;
    }

    .bookmark:hover {
      border-color: rgba(0, 127, 117, 0.45);
      box-shadow: 0 8px 22px rgba(0, 127, 117, 0.12);
      transform: translateY(-1px);
    }

    .bookmark-title {
      color: var(--accent-strong);
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .bookmark-url {
      color: var(--amber);
      font-size: 0.82rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bookmark-description {
      color: var(--muted);
      font-size: 0.94rem;
      margin: 0;
      overflow-wrap: anywhere;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 22px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.6);
      text-align: center;
    }

    @media (max-width: 720px) {
      .app {
        width: min(100% - 20px, 1120px);
        padding-top: 20px;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .search {
        grid-column: 1 / -1;
      }

      button,
      .file-label {
        width: 100%;
        padding-inline: 10px;
      }

      summary {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .count {
        grid-column: 2;
      }

      .links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="topbar">
        <h1>Bookmarks</h1>
        <div class="stats" aria-live="polite">
          <span class="stat" id="categoryCount">0 categories</span>
          <span class="stat" id="bookmarkCount">0 links</span>
        </div>
      </div>

      <div class="controls" aria-label="Bookmark controls">
        <input class="search" id="searchInput" type="search" placeholder="Search bookmarks" autocomplete="off">
        <button type="button" id="expandAll" title="Expand all categories" aria-label="Expand all categories">Open</button>
        <button type="button" id="collapseAll" title="Collapse all categories" aria-label="Collapse all categories">Fold</button>
        <label class="file-label" title="Load a JSON file">
          JSON
          <input id="fileInput" type="file" accept="application/json,.json">
        </label>
      </div>
      <div class="status" id="status" role="status"></div>
    </header>

    <section class="categories" id="categories" aria-live="polite"></section>
  </main>

  <script>
    const categoriesEl = document.querySelector("#categories");
    const searchInput = document.querySelector("#searchInput");
    const statusEl = document.querySelector("#status");
    const categoryCountEl = document.querySelector("#categoryCount");
    const bookmarkCountEl = document.querySelector("#bookmarkCount");
    const expandAllButton = document.querySelector("#expandAll");
    const collapseAllButton = document.querySelector("#collapseAll");
    const fileInput = document.querySelector("#fileInput");

    let bookmarkData = [];

    function normalizeBookmarks(raw) {
      const source = Array.isArray(raw) ? raw : raw.categories || raw.bookmarks;

      if (!Array.isArray(source)) {
        throw new Error("JSON must be an array, or an object with categories or bookmarks.");
      }

      const isFlatList = source.some((entry) => entry && typeof entry === "object" && entry.url);
      const categories = isFlatList ? groupFlatBookmarks(source) : source;

      return categories.map((category, categoryIndex) => {
        const name = String(category.category || category.name || `Category ${categoryIndex + 1}`).trim();
        const items = Array.isArray(category.items) ? category.items : [];

        return {
          category: name || `Category ${categoryIndex + 1}`,
          items: items
            .map((item) => ({
              title: String(item.title || item.name || item.url || "Untitled").trim(),
              url: String(item.url || "").trim(),
              description: String(item.description || item.desc || "").trim()
            }))
            .filter((item) => item.url)
        };
      }).filter((category) => category.items.length);
    }

    function groupFlatBookmarks(items) {
      const grouped = new Map();

      items.forEach((item) => {
        const categoryName = String(item.category || item.group || "Uncategorized").trim() || "Uncategorized";
        if (!grouped.has(categoryName)) {
          grouped.set(categoryName, []);
        }
        grouped.get(categoryName).push(item);
      });

      return Array.from(grouped, ([category, categoryItems]) => ({
        category,
        items: categoryItems
      }));
    }

    function safeUrl(url) {
      try {
        const parsed = new URL(url);
        return ["http:", "https:", "mailto:"].includes(parsed.protocol) ? parsed.href : "#";
      } catch {
        return "#";
      }
    }

    function matchesQuery(category, item, query) {
      const haystack = `${category.category} ${item.title} ${item.url} ${item.description}`.toLowerCase();
      return haystack.includes(query);
    }

    function updateStats(categories) {
      const linkCount = categories.reduce((total, category) => total + category.items.length, 0);
      categoryCountEl.textContent = `${categories.length} ${categories.length === 1 ? "category" : "categories"}`;
      bookmarkCountEl.textContent = `${linkCount} ${linkCount === 1 ? "link" : "links"}`;
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    function render() {
      const query = searchInput.value.trim().toLowerCase();
      const filtered = bookmarkData
        .map((category) => ({
          ...category,
          items: category.items.filter((item) => !query || matchesQuery(category, item, query))
        }))
        .filter((category) => category.items.length);

      updateStats(filtered);
      categoriesEl.innerHTML = "";

      if (!filtered.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = bookmarkData.length ? "No bookmarks match your search." : "No bookmarks loaded.";
        categoriesEl.append(empty);
        return;
      }

      const fragment = document.createDocumentFragment();
      filtered.forEach((category, index) => {
        const details = document.createElement("details");
        details.className = "category";
        details.open = query ? true : index < 2;

        const summary = document.createElement("summary");
        summary.innerHTML = `
          <span class="chevron" aria-hidden="true">⌄</span>
          <span class="category-name"></span>
          <span class="count"></span>
        `;
        summary.querySelector(".category-name").textContent = category.category;
        summary.querySelector(".count").textContent = `${category.items.length} ${category.items.length === 1 ? "link" : "links"}`;

        const links = document.createElement("div");
        links.className = "links";

        category.items.forEach((item) => {
          const anchor = document.createElement("a");
          anchor.className = "bookmark";
          anchor.href = safeUrl(item.url);
          anchor.target = "_blank";
          anchor.rel = "noopener noreferrer";

          const title = document.createElement("span");
          title.className = "bookmark-title";
          title.textContent = item.title || item.url;

          const url = document.createElement("span");
          url.className = "bookmark-url";
          url.textContent = item.url;

          const description = document.createElement("p");
          description.className = "bookmark-description";
          description.textContent = item.description || "No description.";

          anchor.append(title, url, description);
          links.append(anchor);
        });

        details.append(summary, links);
        fragment.append(details);
      });

      categoriesEl.append(fragment);
    }

    async function loadDefaultBookmarks() {
      try {
        const response = await fetch("bookmarks.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Could not load bookmarks.json (${response.status}).`);
        }

        const raw = await response.json();
        bookmarkData = normalizeBookmarks(raw);
        setStatus("Loaded bookmarks.json");
        render();
      } catch (error) {
        bookmarkData = [];
        setStatus("Open this folder with a local web server, or choose bookmarks.json with the JSON button.", true);
        render();
      }
    }

    function loadFromFile(file) {
      const reader = new FileReader();
      reader.addEventListener("load", () => {
        try {
          bookmarkData = normalizeBookmarks(JSON.parse(reader.result));
          setStatus(`Loaded ${file.name}`);
          searchInput.value = "";
          render();
        } catch (error) {
          setStatus(error.message, true);
        }
      });
      reader.addEventListener("error", () => {
        setStatus(`Could not read ${file.name}.`, true);
      });
      reader.readAsText(file);
    }

    searchInput.addEventListener("input", render);

    expandAllButton.addEventListener("click", () => {
      document.querySelectorAll("details.category").forEach((details) => {
        details.open = true;
      });
    });

    collapseAllButton.addEventListener("click", () => {
      document.querySelectorAll("details.category").forEach((details) => {
        details.open = false;
      });
    });

    fileInput.addEventListener("change", (event) => {
      const [file] = event.target.files;
      if (file) {
        loadFromFile(file);
      }
    });

    loadDefaultBookmarks();
  </script>
</body>
</html>
